version: "3.9"

services:
  mcp-server:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file: .env
    environment:
      HOST: "0.0.0.0"
      PORT: "${PORT:-8000}"
    volumes:
      - mcp-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://localhost:${PORT:-8000}/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mcp-data:
